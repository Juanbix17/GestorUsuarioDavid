<!--formulario solicitar usuario,
contraseña, boton ingresar y aplicarle estilos -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>

    <div class="login-box">
        <h2>Iniciar Sesión</h2>
        <form method="POST" action="{{url_for('login')}}">
            <input type="text" name="txtusuario" placeholder="Usuario" required>
            <input type="password" name="txtcontrasena" placeholder="Contraseña" required>
            <button type="submit">Ingresar</button>
            <a href="">¿Olvidaste tu contraseña?</a>
        </form>
    </div>

</body>

</html>
