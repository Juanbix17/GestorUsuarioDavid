<!DOCTYPE html>
<html>
<head>
    <title>Editar</title>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="d-flex justify-content-center align-items-center">

    <div class="login-box">
        <h2>EDITAR USUARIO</h2>

        <form method="POST" action="{{ url_for('actualizar_usuario', id=usu[0]) }}">
            <input type="hidden" name="id" value="{{usu[0]}}">

            <div class="form-inputs">
                <input type="text" name="txtusuario" placeholder="Usuario" value="{{usu[1]}}">

                <input type="password" name="txtpassword" placeholder="Contraseña" value="{{usu[2]}}">

                <input type="text" name="txtrol" placeholder="Rol" value="{{usu[3]}}" disabled>

                <input type="text" name="txtdocumento" placeholder="Documento" value="{{usu[4]}}" disabled>
            </div>

            <button type="submit">ACTUALIZAR</button>

            <a href="{{url_for('inicio')}}" class="forgot-password">Cancelar</a>
        </form>
    </div>

</body>
